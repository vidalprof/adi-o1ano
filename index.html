<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS & GLOBALS
// ═══════════════════════════════════════════════════
const C=document.getElementById('c'), ctx=C.getContext('2d');
const W=800, H=520, HUD=44, GND=H-90;
const LW=3600; // level width — espaço suficiente pro castelo
let gState='menu'; // menu|playing|math|transition|win
let keys={}, score=0, coinCnt=0, lives=3, hasKey=false;
let camX=0, tick=0, phase=1, totalScore=0;
let mathCorrectThisPhase=false;
let parts=[], bgTimer=null;
let transitionStep=0, transLockScale=0, transPlayerX=0, transPlayerY=0, transAlpha=0;
let transRAF=null;

// ═══════════════════════════════════════════════════
//  PHASE DEFINITIONS
// ═══════════════════════════════════════════════════
const PHASES=[null, // 1-indexed
  {name:'Floresta Ensolarada',sky:['#87CEEB','#C9E8FF'],ground:'#5cb83f',dirt:'#c8864a',
   time:'day',weather:'clear',

  {name:'Floresta à Noite',sky:['#0a0a2e','#1a1a4e'],ground:'#2a5c2a',dirt:'#1a3a1a',

   enemyCfg:{goomba:[400,750,1200,1600,2000,2400],fly:[680,1250,1800,2300]}},
  {name:'Montanha Nevada',sky:['#b0c8e8','#dde8f5'],ground:'#e8f0f8',dirt:'#c0ccd8',

   problem:{emoji:'❄️',a:5,b:2},

  {name:'Tempestade',sky:['#2a2a3a','#3a3a4a'],ground:'#4a7a4a',dirt:'#3a5a3a',

   problem:{emoji:'👑',a:5,b:5},

];

// ═══════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════
let AC;
function initAC(){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function beep(f,d,t='square',v=0.12,s=0){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.setValueAtTime(f,AC.currentTime);
    if(s)o.frequency.exponentialRampToValueAtTime(s,AC.currentTime+d);
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d+.01);
  }catch(e){}
}
function sfxCoin(){beep(880,.04);setTimeout(()=>beep(1320,.1),40);}
function sfxJump(){beep(200,.13,'square',.13,620);}
function sfxHurt(){beep(120,.35,'sawtooth',.2);}
function sfxStomp(){beep(280,.09,'triangle',.18);setTimeout(()=>beep(140,.15,'triangle',.12),80);}
function sfxKey(){[660,880,1100,1320].forEach((f,i)=>setTimeout(()=>beep(f,.15),i*75));}
function sfxCorrect(){[784,988,1175,1568].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.15),i*90));}
function sfxWrong(){beep(200,.2,'sawtooth',.15);}
function sfxNextPhase(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,.22,'triangle',.14),i*120));}
function sfxAllWin(){[523,659,784,880,1047,1175,1319].forEach((f,i)=>setTimeout(()=>beep(f,.25,'triangle',.16),i*110));}

const MELODIES=[
  [523,587,659,523,659,784,880,523,659,784,523,659,523,494,523],
  [659,784,880,784,659,523,587,659,784,659,523,440,494,523,587],
  [392,440,494,392,440,392,349,392,440,494,523,494,440,392,349],
  [880,784,659,523,587,659,784,880,784,659,523,494,523,587,659],
  [523,659,784,1047,880,784,659,523,587,659,523,494,440,494,523],
];
function startBgMusic(){
  stopBgMusic();
  if(!AC)return;
  const mel=MELODIES[(phase-1)%MELODIES.length];
  const bass=[130,130,174,174,196,196,196,130,130,174,174,196,196,174,130];
  let i=0,t=AC.currentTime+.05;
  const ph=PHASES[phase];
  const isDark=ph.time==='night'||ph.time==='sunset';
  function step(){
    if(gState!=='playing')return;
    const mf=mel[i%mel.length],bf=bass[i%bass.length];
    const om=AC.createOscillator(),gm=AC.createGain();
    om.connect(gm);gm.connect(AC.destination);
    om.type=isDark?'triangle':'square';
    om.frequency.value=mf;
    gm.gain.setValueAtTime(0.045,t);gm.gain.exponentialRampToValueAtTime(0.001,t+.19);
    om.start(t);om.stop(t+.2);
    const ob=AC.createOscillator(),gb=AC.createGain();
    ob.connect(gb);gb.connect(AC.destination);
    ob.type='triangle';ob.frequency.value=bf;
    gb.gain.setValueAtTime(0.055,t);gb.gain.exponentialRampToValueAtTime(0.001,t+.19);
    ob.start(t);ob.stop(t+.2);
    t+=.21;
    const delay=Math.max(0,(t-AC.currentTime-.05)*1000);
    bgTimer=setTimeout(()=>{i++;step();},delay);
  }
  step();
}
function stopBgMusic(){clearTimeout(bgTimer);}

// ═══════════════════════════════════════════════════
//  LEVEL GENERATION
// ═══════════════════════════════════════════════════
function genLevel(ph){
  const cfg=PHASES[ph];
  const gaps=[{s:12,e:14},{s:28,e:30},{s:50,e:52},{s:68,e:70}];
  const ground=[];
  for(let i=0;i<LW/40+2;i++){
    const inGap=gaps.some(g=>i>=g.s&&i<g.e);
    if(!inGap)ground.push({x:i*40,y:GND,w:40,h:H-GND,type:'ground'});
  }
  const plats=[
    {x:140,y:GND-120,w:110,h:18,type:'plat'},
    {x:340,y:GND-160,w:90,h:18,type:'plat'},
    {x:510,y:GND-110,w:80,h:18,type:'plat'},
    {x:660,y:GND-175,w:110,h:18,type:'plat'},
    {x:860,y:GND-130,w:90,h:18,type:'plat'},
    {x:1040,y:GND-185,w:110,h:18,type:'plat'},
    {x:1220,y:GND-140,w:90,h:18,type:'plat'},
    {x:1400,y:GND-200,w:110,h:18,type:'plat'},
    {x:1590,y:GND-125,w:90,h:18,type:'plat'},
    {x:1770,y:GND-180,w:110,h:18,type:'plat'},
    {x:1960,y:GND-145,w:90,h:18,type:'plat'},
    {x:2140,y:GND-210,w:110,h:18,type:'plat'},
    {x:2350,y:GND-145,w:90,h:18,type:'plat'},
    {x:2530,y:GND-175,w:110,h:18,type:'plat'},
    {x:2720,y:GND-135,w:90,h:18,type:'plat'},
    {x:2900,y:GND-190,w:110,h:18,type:'plat'},
    {x:3060,y:GND-145,w:90,h:18,type:'plat'},
    {x:3200,y:GND-165,w:90,h:18,type:'plat'},
    {x:220,y:GND-160,w:40,h:40,type:'brick'},
    {x:260,y:GND-160,w:40,h:40,type:'brick'},
    {x:740,y:GND-150,w:40,h:40,type:'qblock'},
    {x:1120,y:GND-155,w:40,h:40,type:'brick'},
    {x:1680,y:GND-155,w:40,h:40,type:'qblock'},
    {x:2240,y:GND-165,w:40,h:40,type:'brick'},
    {x:2820,y:GND-155,w:40,h:40,type:'qblock'},
    // Escadas do castelo — recuadas para a porta ficar na frente
    {x:3340,y:GND-90,w:44,h:30,type:'castle'},
    {x:3384,y:GND-130,w:44,h:70,type:'castle'},
    {x:3428,y:GND-170,w:44,h:110,type:'castle'},
    // Corpo principal do castelo — começa depois da porta
    {x:3472,y:GND-220,w:128,h:H-GND+130,type:'castle_main'},
  ];
  const coins=[];
  [[160,GND-165],[200,GND-165],[360,GND-205],[400,GND-205],
   [530,GND-160],[680,GND-220],[720,GND-220],[880,GND-180],
   [1060,GND-230],[1100,GND-230],[1240,GND-185],[1420,GND-245],
   [1460,GND-245],[1610,GND-175],[1790,GND-225],[1830,GND-225],
   [1980,GND-195],[2160,GND-255],[2200,GND-255],[2370,GND-195],
   [2550,GND-225],[2590,GND-225],[2740,GND-185],[2920,GND-240],
   [2960,GND-240],[3080,GND-195],[3110,GND-195],[3180,GND-195],[3250,GND-195]
  ].forEach(([x,y])=>coins.push({x,y,collected:false,animT:Math.random()*100}));
  // Chave posicionada em plataforma visível e acessível
  const keyItem={x:1960,y:GND-185,w:28,h:28,collected:false};
  // Porta encostada na face frontal do castelo principal
  const door={x:3472,y:GND-338,w:56,h:118};
  const enemies=[];
  cfg.enemyCfg.goomba.forEach(x=>enemies.push({x,y:GND-80,w:34,h:36,vx:1.4,vy:0,onGround:false,alive:true,type:'goomba',dir:-1,animT:Math.random()*100}));
  cfg.enemyCfg.fly.forEach(x=>enemies.push({x,y:GND-260,w:36,h:28,vx:1.2,vy:0,alive:true,type:'fly',dir:1,animT:Math.random()*100,floatBase:GND-220-Math.random()*80,floatAmp:40+Math.random()*30}));
  return{ground,plats,all:[...ground,...plats],coins,keyItem,door,enemies};
}

// ═══════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════
let LV={}, P={};
function resetPlayer(){
  P={x:60,y:GND-200,w:32,h:44,vx:0,vy:0,onGround:false,inv:0,animT:0,facing:1,jumpHeld:false};
}
function loadPhase(ph){
  LV=genLevel(ph);
  hasKey=false; coinCnt=0; camX=0; tick=0; parts=[];
  resetPlayer(); updateHUD();
}

// ═══════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════
function rectHit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function grav(o){o.vy=Math.min(o.vy+0.6,16);}
function resolve(obj,solids){
  obj.onGround=false;
  for(const s of solids){
    if(s.type==='castle_main')continue;
    if(!rectHit(obj,s))continue;
    const ox=Math.min(obj.x+obj.w,s.x+s.w)-Math.max(obj.x,s.x);
    const oy=Math.min(obj.y+obj.h,s.y+s.h)-Math.max(obj.y,s.y);
    if(oy<=ox){
      if(obj.y+obj.h/2<s.y+s.h/2){obj.y=s.y-obj.h;obj.vy=0;obj.onGround=true;}
      else{obj.y=s.y+s.h;obj.vy=Math.max(0,obj.vy);}
    }else{
      if(obj.x+obj.w/2<s.x+s.w/2){obj.x=s.x-obj.w;if(obj.vx>0)obj.vx=-Math.abs(obj.vx||1.4);}
      else{obj.x=s.x+s.w;if(obj.vx<0)obj.vx=Math.abs(obj.vx||1.4);}
    }
  }
}

// ═══════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════
function burst(x,y,col,n=8,vs=1){
  for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*5*vs,vy:(-Math.random()*5-1)*vs,life:40,maxLife:40,col,r:3+Math.random()*3});
}

// ═══════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════
function update(){
  if(gState!=='playing')return;
  tick++;
  // player
  const spd=4.2;
  if(keys['ArrowLeft']||keys['a']||keys['A']){P.vx=-spd;P.facing=-1;}
  else if(keys['ArrowRight']||keys['d']||keys['D']){P.vx=spd;P.facing=1;}
  else P.vx*=0.72;
  const wj=keys['ArrowUp']||keys[' ']||keys['w']||keys['W'];
  if(wj&&P.onGround&&!P.jumpHeld){P.vy=-13;P.jumpHeld=true;sfxJump();}
  if(!wj)P.jumpHeld=false;
  if(P.jumpHeld&&P.vy<-6&&wj)P.vy-=.3;
  grav(P);P.x+=P.vx;P.y+=P.vy;
  P.x=Math.max(0,Math.min(P.x,LW-P.w));
  resolve(P,LV.all);
  if(P.inv>0)P.inv--;
  P.animT++;
  if(P.y>H+60){loseLife();return;}
  camX=Math.max(0,Math.min(P.x-W/2+100,LW-W));
  // enemies
  for(const e of LV.enemies){
    if(!e.alive)continue;
    e.animT++;
    if(e.type==='fly'){
      e.x+=e.vx*e.dir;
      e.y=e.floatBase+Math.sin(e.animT*.035)*e.floatAmp;
      if(e.x<30||e.x>LW-50)e.dir*=-1;
    }else{
      e.vx=1.5*e.dir;
      grav(e);e.x+=e.vx;e.y+=e.vy;
      resolve(e,LV.all);
      if(e.y>H+60){e.alive=false;continue;}
      if(e.onGround){
        const pl={x:e.x-2,y:e.y+e.h+2,w:1,h:1},pr={x:e.x+e.w+1,y:e.y+e.h+2,w:1,h:1};
        const ol=LV.all.some(s=>rectHit(pl,s)),or=LV.all.some(s=>rectHit(pr,s));
        if(e.dir>0&&!or)e.dir=-1;
        if(e.dir<0&&!ol)e.dir=1;
      }
    }
    if(P.inv===0&&rectHit(P,e)){
      if(P.vy>0&&P.y+P.h<e.y+e.h*.55){
        e.alive=false;P.vy=-10;score+=200;sfxStomp();
        burst(e.x+17,e.y+18,'#ff8800',10,1.2);updateHUD();
      }else{loseLife();return;}
    }
  }
  // coins
  for(const c of LV.coins){
    if(c.collected)continue;
    c.animT++;
    if(Math.abs(P.x+16-(c.x+10))<22&&Math.abs(P.y+22-(c.y+10))<22){
      c.collected=true;coinCnt++;score+=100;sfxCoin();
      burst(c.x+10,c.y+10,'#ffe94e',5,.8);updateHUD();
    }
  }
  // key
  if(!LV.keyItem.collected){
    if(rectHit(P,LV.keyItem)){
      LV.keyItem.collected=true;hasKey=true;score+=500;sfxKey();
      burst(LV.keyItem.x+14,LV.keyItem.y+14,'#ffe94e',14,1.2);updateHUD();
    }
  }
  // door
  if(hasKey&&rectHit(P,LV.door)){triggerMath();}
  // particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life--;
    if(p.life<=0)parts.splice(i,1);
  }
}
function loseLife(){
  if(P.inv>0)return;
  lives--;updateHUD();sfxHurt();
  burst(P.x+16,P.y+22,'#ff4444',10,1.3);
  if(lives<=0){gState='menu';stopBgMusic();showMenu('💀 GAME OVER','Você perdeu todas as vidas!');return;}
  P.x=Math.max(60,camX);P.y=GND-280;P.vx=0;P.vy=0;P.inv=140;
}
function updateHUD(){
  document.getElementById('hLives').textContent=lives;
  document.getElementById('hCoins').textContent=coinCnt;
  document.getElementById('hScore').textContent=score;
  document.getElementById('hKey').textContent=hasKey?'✓':'✗';
  document.getElementById('hPhase').textContent=phase;
}

// ═══════════════════════════════════════════════════
//  MATH CHALLENGE
// ═══════════════════════════════════════════════════
function triggerMath(){
  gState='math'; stopBgMusic();
  const cfg=PHASES[phase];
  const p=cfg.problem;
  const ans=p.a+p.b;
  const wrongs=new Set();
  while(wrongs.size<2){const w=ans+(Math.floor(Math.random()*6)-3);if(w>0&&w!==ans)wrongs.add(w);}
  const opts=[ans,...wrongs].sort(()=>Math.random()-.5);
  document.getElementById('mathProbText').innerHTML=
    `Fase ${phase}: Quanto é <b>${p.a}</b> + <b class="b2">${p.b}</b>?`;
  const vis=document.getElementById('mathVis');
  vis.innerHTML='';
  const ga=document.createElement('div');ga.className='mgrp';
  for(let i=0;i<p.a;i++){const s=document.createElement('span');s.className='mobj';s.textContent=p.emoji;ga.appendChild(s);}
  const pl=document.createElement('span');pl.className='mplus';pl.textContent='+';
  const gb=document.createElement('div');gb.className='mgrp';
  for(let i=0;i<p.b;i++){const s=document.createElement('span');s.className='mobj';s.textContent=p.emoji;gb.appendChild(s);}
  vis.appendChild(ga);vis.appendChild(pl);vis.appendChild(gb);
  const od=document.getElementById('mathOpts');od.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='mBtn';b.textContent=o;
    b.onclick=()=>checkMath(o,ans);od.appendChild(b);
  });
  document.getElementById('mathFb').textContent='';
  document.getElementById('math').style.display='flex';
}
function checkMath(chosen,ans){
  document.querySelectorAll('.mBtn').forEach(b=>{
    b.disabled=true;
    if(parseInt(b.textContent)===ans)b.classList.add('correct');
    else if(parseInt(b.textContent)===chosen&&chosen!==ans)b.classList.add('wrong');
  });
  if(chosen===ans){
    document.getElementById('mathFb').innerHTML='<span style="color:#57e389">✅ Muito bem! Correto! 🎉</span>';
    mathCorrectThisPhase=true; sfxCorrect();
    score+=phase*300;
    setTimeout(()=>{document.getElementById('math').style.display='none';startTransition();},1400);
  }else{
    document.getElementById('mathFb').innerHTML=`<span style="color:#ff7777">❌ Era ${ans}! Mas pode avançar 💪</span>`;
    mathCorrectThisPhase=false; sfxWrong();
    setTimeout(()=>{document.getElementById('math').style.display='none';startTransition();},1800);
  }
}

// ═══════════════════════════════════════════════════
//  PHASE TRANSITION  — big lock door animation
// ═══════════════════════════════════════════════════
function startTransition(){
  if(phase>=10){finishGame();return;}
  gState='transition';
  const nextPh=PHASES[phase+1];
  document.getElementById('transMsg').textContent=`Fase ${phase+1}: ${nextPh.name}`;
  document.getElementById('transition').style.display='flex';
  transitionStep=0; transLockScale=0; transPlayerX=100; transPlayerY=60; transAlpha=0;
  sfxNextPhase();
  animateTransition();
}
function animateTransition(){
  transitionStep++;
  const tc=document.getElementById('transCanvas');
  const tx=tc.getContext('2d');
  tx.clearRect(0,0,200,140);

  // draw the big lock
  const lockS=Math.min(transitionStep/30,1);
  transLockScale=lockS;
  const lx=100,ly=75;
  tx.save();tx.translate(lx,ly);tx.scale(lockS,lockS);
  // lock body
  const lg=tx.createLinearGradient(-30,-20,30,40);
  lg.addColorStop(0,'#f39c12');lg.addColorStop(1,'#d68910');
  tx.fillStyle=lg;
  tx.fillRect(-28,-15,56,50);
  tx.fillStyle='rgba(255,255,255,0.15)';tx.fillRect(-26,-13,20,10);
  // shackle
  tx.strokeStyle='#e67e22';tx.lineWidth=12;tx.lineCap='round';
  tx.beginPath();tx.arc(0,-15,20,Math.PI,0);tx.stroke();
  tx.strokeStyle='#f39c12';tx.lineWidth=8;
  tx.beginPath();tx.arc(0,-15,20,Math.PI,0);tx.stroke();
  // keyhole
  tx.fillStyle='#5d4037';
  tx.beginPath();tx.arc(0,8,9,0,Math.PI*2);tx.fill();
  tx.fillRect(-4,8,8,14);
  tx.restore();

  // draw player walking toward lock
  if(transitionStep>15){
    const px=Math.min(transPlayerX+(transitionStep>15?3:0),72);
    transPlayerX=px;
    drawMiniPlayer(tx,px,transPlayerY,transitionStep*.18);
  }

  // player shrinks into keyhole
  if(transitionStep>55){
    const shrink=Math.max(0,1-(transitionStep-55)/15);
    const px=transPlayerX+(1-shrink)*26;
    const py=transPlayerY+(1-shrink)*15;
    tx.save();tx.translate(px,py);tx.scale(shrink,shrink);
    drawMiniPlayer(tx,0,0,transitionStep*.2);
    tx.restore();
  }

  // lock fades out
  if(transitionStep>70){
    transAlpha=Math.min((transitionStep-70)/20,1);
    tx.fillStyle=`rgba(0,0,0,${transAlpha})`;
    tx.fillRect(0,0,200,140);
  }

  if(transitionStep<95){
    transRAF=requestAnimationFrame(animateTransition);
  }else{
    document.getElementById('transition').style.display='none';
    phase++;totalScore=score;
    loadPhase(phase);
    gState='playing';
    startBgMusic();
  }
}
function drawMiniPlayer(tx,x,y,t){
  tx.save();tx.translate(x,y);
  tx.fillStyle='#3e2723';tx.fillRect(-7,18,5,7);tx.fillRect(2,18,5,7);
  tx.fillStyle='#1565c0';tx.fillRect(-6,8,12,12);
  tx.fillStyle='#c62828';tx.fillRect(-8,6,4,10);tx.fillRect(4,6,4,10);
  tx.fillStyle='#ffcc80';
  tx.beginPath();tx.ellipse(0,-4,6,7,0,0,Math.PI*2);tx.fill();
  tx.fillStyle='#c62828';tx.fillRect(-7,-14,14,8);tx.fillRect(-6,-18,12,6);
  tx.fillStyle='#3e2723';
  tx.beginPath();tx.ellipse(-3,-3,4,2,-.2,0,Math.PI);tx.fill();
  tx.beginPath();tx.ellipse(3,-3,4,2,.2,0,Math.PI);tx.fill();
  tx.restore();
}

let snowflakes=[];let raindrops=[];let lavaParticles=[];
function initWeather(){
  snowflakes=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*3+1,s:Math.random()*1.5+.5}));
  raindrops=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,l:Math.random()*18+8,s:Math.random()*6+10}));
  lavaParticles=Array.from({length:40},()=>({x:Math.random()*LW,y:GND+Math.random()*40,r:Math.random()*8+4,life:Math.random()*60,maxLife:60}));
}

function drawSky(ph){
  const cfg=PHASES[ph];
  const sk=ctx.createLinearGradient(0,HUD,0,H);
  sk.addColorStop(0,cfg.sky[0]);sk.addColorStop(1,cfg.sky[1]);
  ctx.fillStyle=sk;ctx.fillRect(0,HUD,W,H-HUD);

  // celestial
  if(cfg.time==='day'||cfg.time==='sunset'){
    const sx=W-100-camX*.04, sy=90;
    const col=cfg.time==='sunset'?'#ff8c42':'#ffe94e';
    ctx.save();ctx.translate(sx,sy);
    const sg=ctx.createRadialGradient(0,0,8,0,0,32);
    sg.addColorStop(0,'#fff3a0');sg.addColorStop(1,col);
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(255,${cfg.time==='sunset'?'140,66':'220,0'},.35)`;ctx.lineWidth=3;
    for(let a=0;a<8;a++){const ang=a/8*Math.PI*2+tick*.004;ctx.beginPath();ctx.moveTo(Math.cos(ang)*32,Math.sin(ang)*32);ctx.lineTo(Math.cos(ang)*50,Math.sin(ang)*50);ctx.stroke();}
    ctx.restore();
  }else{
    // moon + stars
    ctx.fillStyle='rgba(255,255,230,0.95)';
    ctx.beginPath();ctx.arc(W-120-camX*.04,80,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=PHASES[ph].sky[0];ctx.beginPath();ctx.arc(W-110-camX*.04,74,18,0,Math.PI*2);ctx.fill();
    // stars
    const rng=seededRng(ph*100);
    for(let i=0;i<40;i++){
      const sx=(rng()*W+Math.sin(tick*.002+i)*2)%W;
      const sy=HUD+rng()*(H*.5);
      const a=0.5+Math.sin(tick*.05+i*1.3)*.3;
      ctx.fillStyle=`rgba(255,255,255,${a})`;
      ctx.beginPath();ctx.arc(sx,sy,rng()*2+.5,0,Math.PI*2);ctx.fill();
    }
  }
  // clouds
  if(cfg.weather!=='lava'){
    const numC=cfg.weather==='rain'?8:6;
    const rng2=seededRng(ph*200);
    for(let i=0;i<numC;i++){
      const cx=((rng2()*LW*1.5-camX*(cfg.weather==='clear'?.15:.1))%(W+400));
      const cy=HUD+50+rng2()*100;
      const cw=60+rng2()*80;
      const col=cfg.time==='night'?'rgba(60,60,90,.7)':cfg.weather==='rain'?'rgba(80,80,90,.8)':'rgba(255,255,255,.88)';
      drawCloud(cx,cy,cw,col);
    }
  }
  if(cfg.time!=='night'&&cfg.weather!=='snow'){
    // hills
    const hcol=cfg.time==='sunset'?'#c04a00':cfg.weather==='rain'?'#3a5a3a':'#5aab3a';
    const hcol2=cfg.time==='sunset'?'#903000':'#3a8a2a';
    drawHill(-camX*.28+200,GND,170,hcol);
    drawHill(-camX*.28+600,GND,200,hcol2);
    drawHill(-camX*.28+1100,GND,155,hcol);
    drawHill(-camX*.28+1600,GND,185,hcol2);
    drawHill(-camX*.28+2200,GND,195,hcol);
    drawHill(-camX*.28+2800,GND,165,hcol2);
  }
  // snow hills
  if(cfg.weather==='snow'){
    ['#c0d8f0','#a8c8e0'].forEach((c,i)=>{
      [200+i*100,700,1200,1800,2400,3000].forEach(hx=>{
        drawHill(-camX*.25+hx,GND,150+i*30,c);
      });
    });
  }
  // trees
  if(cfg.time!=='night'&&cfg.weather!=='snow'&&cfg.weather!=='lava'){
    const tc=cfg.time==='sunset'?'#1a0a00':'#2d7a2d';
    [120,460,820,1180,1560,1940,2320,2700,3070].forEach((tx,i)=>{
      drawTree(-camX*.38+tx,GND,18+i%3*5,tc);
    });
  }
  // pine trees for snow
  if(cfg.weather==='snow'){
    [140,500,860,1240,1620,2000,2380,2760].forEach((tx,i)=>{
      drawPine(-camX*.35+tx,GND,24+i%3*4);
    });
  }
  // lava bg
  if(cfg.weather==='lava'){
    // lava glow
    const lg=ctx.createLinearGradient(0,GND-60,0,H);
    lg.addColorStop(0,'rgba(200,50,0,.0)');lg.addColorStop(1,'rgba(200,80,0,.5)');
    ctx.fillStyle=lg;ctx.fillRect(0,GND-60,W,H-GND+60);
    // volcano shapes
    [-camX*.2+500,-camX*.2+1400,-camX*.2+2200].forEach(vx=>{
      ctx.fillStyle='#2a1010';
      ctx.beginPath();ctx.moveTo(vx-80,GND);ctx.lineTo(vx,GND-160);ctx.lineTo(vx+80,GND);ctx.fill();
      ctx.fillStyle='#ff4400';ctx.fillRect(vx-12,GND-160,24,30);
    });
    // lava river
    const lavaG=ctx.createLinearGradient(0,GND,0,H);
    lavaG.addColorStop(0,'#ff4400');lavaG.addColorStop(.5,'#ff6600');lavaG.addColorStop(1,'#cc2200');
    ctx.fillStyle=lavaG;ctx.fillRect(0,GND,W,H-GND);
    // bubbles
    for(let i=0;i<8;i++){
      const bx=(i*130+tick*1.2)%(W)+30;
      const by=GND+10+Math.sin(tick*.1+i)*8;
      ctx.fillStyle='rgba(255,100,0,0.6)';
      ctx.beginPath();ctx.arc(bx,by,4+Math.sin(tick*.15+i)*2,0,Math.PI*2);ctx.fill();
    }
  }
}
function seededRng(seed){let s=seed;return function(){s=(s*9301+49297)%233280;return s/233280;};}
function drawCloud(cx,cy,cw,col){
  if(cx<-150||cx>W+150)return;
  ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(cx,cy,cw*.55,cw*.28,0,0,Math.PI*2);
  ctx.ellipse(cx-cw*.32,cy+cw*.06,cw*.38,cw*.23,0,0,Math.PI*2);
  ctx.ellipse(cx+cw*.32,cy+cw*.04,cw*.42,cw*.22,0,0,Math.PI*2);
  ctx.fill();
}
function drawHill(hx,baseY,r,col){
  if(hx+r<-50||hx-r>W+50)return;
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(hx,baseY,r,Math.PI,0);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.beginPath();ctx.arc(hx-r*.2,baseY-r*.4,r*.35,Math.PI,0);ctx.fill();
}
function drawTree(sx,baseY,h,col){
  if(sx<-60||sx>W+60)return;
  ctx.fillStyle='#7a4e2d';ctx.fillRect(sx-4,baseY-h*.4,8,h*.42);
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(sx,baseY-h*.62,h*.44,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.beginPath();ctx.arc(sx-h*.12,baseY-h*.6,h*.22,0,Math.PI*2);ctx.fill();
}
function drawPine(sx,baseY,h){
  if(sx<-60||sx>W+60)return;
  ctx.fillStyle='#7a4e2d';ctx.fillRect(sx-3,baseY-h*.3,6,h*.32);
  ctx.fillStyle='#1a5c2a';
  [[0,1],[.22,.72],[.4,.44]].forEach(([off,wf])=>{
    ctx.beginPath();ctx.moveTo(sx,baseY-(h*.3+off*h*.7));
    ctx.lineTo(sx-h*wf*.5,baseY-(h*.3+off*h*.55));
    ctx.lineTo(sx+h*wf*.5,baseY-(h*.3+off*h*.55));
    ctx.fill();
  });
}
function drawWeather(ph){
  const cfg=PHASES[ph];
  if(cfg.weather==='snow'){
    ctx.fillStyle='rgba(220,240,255,0.8)';
    for(const s of snowflakes){
      s.y+=s.s;s.x+=Math.sin(tick*.02+s.y*.01)*.5;
      if(s.y>H){s.y=HUD;s.x=Math.random()*W;}
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    }
    // snow on ground overlay
    ctx.fillStyle='rgba(220,235,250,0.3)';ctx.fillRect(0,GND,W,H-GND);
  }
  if(cfg.weather==='rain'){
    ctx.strokeStyle='rgba(150,180,220,0.6)';ctx.lineWidth=1.5;
    for(const r of raindrops){
      r.y+=r.s;r.x-=2;
      if(r.y>H){r.y=HUD;r.x=Math.random()*W;}
      ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x+3,r.y+r.l);ctx.stroke();
    }
    // lightning
    if(Math.floor(tick/120)%2===0&&tick%120<3){
      ctx.fillStyle='rgba(255,255,220,0.4)';ctx.fillRect(0,HUD,W,H-HUD);
    }
  }
}

function drawGround(ph){
  const cfg=PHASES[ph];
  for(const t of LV.ground){
    const sx=t.x-camX;
    if(sx+t.w<-2||sx>W+2)continue;
    // grass top
    if(cfg.weather==='snow'){
      ctx.fillStyle='#e8f4fc';ctx.fillRect(sx,t.y,t.w,10);
      ctx.fillStyle='#c8ddf0';ctx.fillRect(sx,t.y+8,t.w,5);
    }else if(cfg.weather==='lava'){
      ctx.fillStyle='#444';ctx.fillRect(sx,t.y,t.w,10);
      ctx.fillStyle='rgba(255,100,0,0.3)';ctx.fillRect(sx,t.y,t.w,4);
    }else{
      ctx.fillStyle=cfg.ground;ctx.fillRect(sx,t.y,t.w,12);
      ctx.fillStyle=cfg.time==='night'?'rgba(0,60,0,0.8)':'#3d8f27';ctx.fillRect(sx,t.y+10,t.w,4);
    }
    // dirt
    const dg=ctx.createLinearGradient(sx,t.y+12,sx,t.y+t.h);
    if(cfg.weather==='snow'){dg.addColorStop(0,'#a0b8cc');dg.addColorStop(1,'#708898');}
    else if(cfg.weather==='lava'){dg.addColorStop(0,'#333');dg.addColorStop(1,'#1a1a1a');}
    else{dg.addColorStop(0,cfg.dirt);dg.addColorStop(1,'#7a4020');}
    ctx.fillStyle=dg;ctx.fillRect(sx,t.y+12,t.w,t.h-12);
    ctx.fillStyle='rgba(0,0,0,0.07)';
    for(let r=0;r<3;r++)for(let c=0;c<2;c++)ctx.fillRect(sx+c*22+4,t.y+20+r*20,14,8);
  }
}
function drawPlatforms(ph){
  const cfg=PHASES[ph];
  for(const p of LV.plats){
    const sx=p.x-camX;
    if(sx+p.w<-4||sx>W+4)continue;
    if(p.type==='plat'){
      // themed platforms
      if(cfg.weather==='snow'){
        ctx.fillStyle='#6699bb';ctx.fillRect(sx,p.y,p.w,p.h);
        ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fillRect(sx,p.y,p.w,7);
        ctx.fillStyle='rgba(200,230,255,0.4)';ctx.fillRect(sx+2,p.y+2,p.w-4,4);
      }else if(cfg.weather==='lava'){
        ctx.fillStyle='#333';ctx.fillRect(sx,p.y,p.w,p.h);
        ctx.fillStyle='rgba(255,80,0,0.5)';ctx.fillRect(sx,p.y,p.w,5);
        ctx.fillStyle='rgba(255,150,0,0.2)';ctx.fillRect(sx+2,p.y+2,p.w-4,4);
      }else if(cfg.name.includes('Praia')){
        // palm log platform
        ctx.fillStyle='#d4a44a';ctx.fillRect(sx,p.y,p.w,p.h);
        ctx.strokeStyle='#a07030';ctx.lineWidth=2;
        for(let i=0;i<Math.ceil(p.w/18);i++)ctx.strokeRect(sx+i*18,p.y,18,p.h);
      }else if(cfg.name.includes('Caverna')){
        ctx.fillStyle='#4a3a2a';ctx.fillRect(sx,p.y,p.w,p.h);
        ctx.fillStyle='#5a4a3a';ctx.fillRect(sx,p.y,p.w,5);
        // crystals
        if(p.w>60){
          ctx.fillStyle='rgba(100,200,255,0.6)';
          ctx.beginPath();ctx.moveTo(sx+12,p.y);ctx.lineTo(sx+16,p.y-12);ctx.lineTo(sx+20,p.y);ctx.fill();
          ctx.fillStyle='rgba(200,100,255,0.6)';
          ctx.beginPath();ctx.moveTo(sx+28,p.y);ctx.lineTo(sx+33,p.y-16);ctx.lineTo(sx+38,p.y);ctx.fill();
        }
      }else{
        // default mushroom platform
        ctx.fillStyle='#c0392b';ctx.fillRect(sx,p.y,p.w,p.h);
        ctx.fillStyle='#e74c3c';ctx.fillRect(sx+2,p.y+2,p.w-4,p.h/2-2);
        ctx.fillStyle='rgba(255,255,255,0.75)';
        ctx.beginPath();ctx.arc(sx+p.w*.25,p.y+p.h*.35,4,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(sx+p.w*.6,p.y+p.h*.3,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(sx,p.y+p.h-4,p.w,4);
      }
    }else if(p.type==='brick'){
      const bc=cfg.weather==='lava'?'#5a2a20':cfg.time==='night'?'#7a3020':'#c0392b';
      ctx.fillStyle=bc;ctx.fillRect(sx,p.y,p.w,p.h);
      ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(sx,p.y,p.w,3);
      ctx.fillStyle='rgba(0,0,0,0.18)';
      ctx.fillRect(sx,p.y+p.h/2-1,p.w,3);ctx.fillRect(sx+p.w/2-1,p.y,3,p.h/2);
      ctx.fillRect(sx+p.w/4-1,p.y+p.h/2,3,p.h/2);ctx.fillRect(sx+3*p.w/4-1,p.y+p.h/2,3,p.h/2);
      ctx.fillStyle='rgba(255,200,150,0.15)';ctx.fillRect(sx+2,p.y+2,p.w*.4,4);
    }else if(p.type==='qblock'){
      const pulse=0.88+Math.sin(tick*.07)*.08;
      ctx.save();ctx.translate(sx+p.w/2,p.y+p.h/2);ctx.scale(pulse,pulse);ctx.translate(-p.w/2,-p.h/2);
      const qg=ctx.createLinearGradient(0,0,0,p.h);qg.addColorStop(0,'#f39c12');qg.addColorStop(1,'#d68910');
      ctx.fillStyle=qg;ctx.fillRect(0,0,p.w,p.h);
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(2,2,p.w-4,6);
      ctx.fillStyle='#fff';ctx.font=`bold ${p.w*.55}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',p.w/2,p.h/2+1);
      ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=2;ctx.strokeRect(1,1,p.w-2,p.h-2);
      ctx.restore();
    }else if(p.type==='castle'||p.type==='castle_main'){
      const cc=cfg.name.includes('Final')?'#4a0a4a':cfg.weather==='lava'?'#3a1a1a':'#5a5a6a';
      const cc2=cfg.name.includes('Final')?'#3a083a':cfg.weather==='lava'?'#2a0808':'#3a3a4a';
      ctx.fillStyle=cc;ctx.fillRect(sx,p.y,p.w,p.h);
      ctx.fillStyle='rgba(0,0,0,0.12)';
      for(let r=0;r<Math.ceil(p.h/20);r++)for(let c=0;c<Math.ceil(p.w/20);c++)
        if((r+c)%2===0)ctx.fillRect(sx+c*20,p.y+r*20,18,18);
      ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(sx+2,p.y+2,8,p.h-4);
      if(p.type==='castle_main'){
        ctx.fillStyle='#1a1a2e';
        ctx.fillRect(sx+14,p.y+20,22,26);ctx.fillRect(sx+p.w-36,p.y+20,22,26);
        ctx.fillRect(sx+14,p.y+60,22,26);ctx.fillRect(sx+p.w-36,p.y+60,22,26);
        ctx.beginPath();ctx.arc(sx+p.w/2,p.y+p.h-28,20,Math.PI,0);
        ctx.rect(sx+p.w/2-20,p.y+p.h-58,40,30);ctx.fillStyle='#1a1a2e';ctx.fill();
        ctx.strokeStyle='#888';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(sx+p.w/2,p.y);ctx.lineTo(sx+p.w/2,p.y-42);ctx.stroke();
        const fc=cfg.name.includes('Final')?'#8a00ff':'#e74c3c';
        ctx.fillStyle=fc;
        ctx.beginPath();ctx.moveTo(sx+p.w/2,p.y-42);ctx.lineTo(sx+p.w/2+22,p.y-30);ctx.lineTo(sx+p.w/2,p.y-18);ctx.fill();
        ctx.fillStyle=cc2;
        for(let bi=0;bi<7;bi++)ctx.fillRect(sx+bi*18+2,p.y-16,14,16);
      }
    }
  }
}

function drawCoins(){
  for(const c of LV.coins){
    if(c.collected)continue;
    const sx=c.x-camX;
    if(sx<-20||sx>W+20)continue;
    const bob=Math.sin(c.animT*.08)*5;c.animT++;
    ctx.save();ctx.translate(sx+10,c.y+10+bob);
    const cg=ctx.createRadialGradient(-2,-2,1,0,0,10);
    cg.addColorStop(0,'#fff3a0');cg.addColorStop(.5,'#ffe94e');cg.addColorStop(1,'#c8a000');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(180,140,0,.55)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(160,120,0,.55)';ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',0,0);
    ctx.restore();
  }
}
function drawKey(){
  if(LV.keyItem.collected)return;
  const sx=LV.keyItem.x-camX;
  if(sx<-40||sx>W+40)return;
  const bob=Math.sin(tick*.06)*5;
  ctx.save();ctx.translate(sx+14,LV.keyItem.y+14+bob);
  ctx.shadowColor='#ffe94e';ctx.shadowBlur=18;
  const kg=ctx.createRadialGradient(-2,-2,1,0,0,10);
  kg.addColorStop(0,'#fff3a0');kg.addColorStop(1,'#c8a000');
  ctx.fillStyle=kg;ctx.beginPath();ctx.arc(0,-3,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(0,-3,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#d4a000';ctx.fillRect(-3,6,6,16);ctx.fillRect(-3,14,10,4);ctx.fillRect(-3,20,8,4);
  ctx.shadowBlur=0;ctx.restore();
  ctx.fillStyle='rgba(255,233,78,.9)';ctx.font='bold 7px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('CHAVE',sx+14,LV.keyItem.y-14+bob);
}
function drawDoor(){
  const d=LV.door,sx=d.x-camX;
  if(sx+d.w<-10||sx>W+10)return;
  ctx.save();
  // glow quando tem chave
  if(hasKey){
    const pulse=0.5+Math.sin(tick*.08)*.3;
    ctx.shadowColor='#2ecc71';ctx.shadowBlur=22+pulse*10;
  }
  // marco da porta
  ctx.fillStyle='#4a2800';ctx.fillRect(sx-8,d.y-8,d.w+16,d.h+8);
  ctx.fillStyle='#7a4200';ctx.fillRect(sx-5,d.y-5,d.w+10,d.h+5);
  // painel principal
  ctx.fillStyle=hasKey?'#1e8449':'#2c3e50';ctx.fillRect(sx,d.y,d.w,d.h);
  // brilho lateral
  const dg=ctx.createLinearGradient(sx,d.y,sx+d.w,d.y);
  dg.addColorStop(0,'rgba(255,255,255,0.22)');dg.addColorStop(.35,'rgba(255,255,255,0)');
  ctx.fillStyle=dg;ctx.fillRect(sx,d.y,d.w,d.h);
  // painéis internos
  ctx.strokeStyle=hasKey?'#27ae60':'#1a252f';ctx.lineWidth=2;
  ctx.strokeRect(sx+7,d.y+8,d.w-14,d.h*.44-4);
  ctx.strokeRect(sx+7,d.y+d.h*.44+4,d.w-14,d.h*.52-10);
  // maçaneta
  ctx.fillStyle=hasKey?'#f1c40f':'#7f8c8d';
  ctx.beginPath();ctx.arc(sx+d.w*.72,d.y+d.h*.56,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=hasKey?'#e67e22':'#555';
  ctx.beginPath();ctx.arc(sx+d.w*.72,d.y+d.h*.56,4,0,Math.PI*2);ctx.fill();
  // arco do topo
  ctx.fillStyle=hasKey?'#1a7a40':'#1a252f';
  ctx.beginPath();ctx.arc(sx+d.w/2,d.y,d.w/2,Math.PI,0);ctx.fill();
  ctx.strokeStyle=hasKey?'#27ae60':'#111';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(sx+d.w/2,d.y,d.w/2,Math.PI,0);ctx.stroke();
  ctx.shadowBlur=0;
  // cadeado ou símbolo de aberto
  if(!hasKey){
    ctx.fillStyle='#ffd700';ctx.font='24px sans-serif';ctx.textAlign='center';
    ctx.fillText('🔒',sx+d.w/2,d.y+d.h/2+10);
    // label
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 7px "Press Start 2P",monospace';
    ctx.fillText('PORTA',sx+d.w/2,d.y-16);
  }else{
    // porta aberta pulsando
    ctx.fillStyle=`rgba(46,204,113,${0.3+Math.sin(tick*.1)*.2})`;
    ctx.fillRect(sx,d.y,d.w,d.h);
    ctx.fillStyle='#2ecc71';ctx.font='bold 7px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('ENTRAR!',sx+d.w/2,d.y-16);
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  DRAW — ENEMIES
// ═══════════════════════════════════════════════════
function drawGoomba(e,ph){
  const sx=e.x-camX;
  if(sx+e.w<-4||sx>W+4||!e.alive)return;
  ctx.save();ctx.translate(sx+17,e.y+e.h);
  const walk=Math.sin(e.animT*.2)*8;
  const cfg=PHASES[ph];
  // themed colors
  let bodyCol,bodyHi,eyeC='#1a0a00',teethCol='#fff';
  if(ph===9){bodyCol='#4a1010';bodyHi='#6a1a1a';}// lava phase
  else if(ph===7){bodyCol='#2a1a4a';bodyHi='#3a2a6a';}// caverna
  else if(ph===4){bodyCol='#7090a0';bodyHi='#90b0c0';}// neve
  else{bodyCol='#8b4513';bodyHi='#a05428';}
  const bg=ctx.createRadialGradient(-4,-20,3,0,-16,17);
  bg.addColorStop(0,bodyHi);bg.addColorStop(1,bodyCol);
  ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,-18,17,18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,200,150,0.25)';ctx.beginPath();ctx.ellipse(0,-14,10,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ph===4?'#d4c8b8':'#d4956a';
  ctx.beginPath();ctx.ellipse(0,-28,13,10,0,0,Math.PI);ctx.fill();
  // eyes
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-6,-30,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6,-30,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-6,-29,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6,-29,3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=eyeC;ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-11,-35);ctx.lineTo(-2,-31);ctx.stroke();
  ctx.beginPath();ctx.moveTo(11,-35);ctx.lineTo(2,-31);ctx.stroke();
  ctx.strokeStyle=eyeC;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,-22,6,.2,Math.PI-.2);ctx.stroke();
  ctx.fillStyle=teethCol;ctx.fillRect(-6,-24,5,5);ctx.fillRect(1,-24,5,5);
  // horns/ears by phase
  if(ph===9){// lava: big horns
    ctx.fillStyle='#8a0000';
    ctx.beginPath();ctx.moveTo(-14,-36);ctx.lineTo(-8,-20);ctx.lineTo(-2,-36);ctx.fill();
    ctx.beginPath();ctx.moveTo(14,-36);ctx.lineTo(8,-20);ctx.lineTo(2,-36);ctx.fill();
  }else if(ph===7){// cave: bat ears
    ctx.fillStyle='#5a2a8a';
    ctx.beginPath();ctx.moveTo(-13,-36);ctx.lineTo(-7,-22);ctx.lineTo(-1,-36);ctx.fill();
    ctx.beginPath();ctx.moveTo(13,-36);ctx.lineTo(7,-22);ctx.lineTo(1,-36);ctx.fill();
  }else{
    ctx.fillStyle=bodyCol;
    ctx.beginPath();ctx.moveTo(-12,-38);ctx.lineTo(-7,-28);ctx.lineTo(-3,-38);ctx.fill();
    ctx.beginPath();ctx.moveTo(12,-38);ctx.lineTo(7,-28);ctx.lineTo(3,-38);ctx.fill();
  }
  // feet
  ctx.fillStyle='#3e2010';
  ctx.save();ctx.rotate(walk*.018);ctx.fillRect(-14,-10,12,10);ctx.restore();
  ctx.save();ctx.rotate(-walk*.018);ctx.fillRect(2,-10,12,10);ctx.restore();
  ctx.restore();
}
function drawFlyEnemy(e,ph){
  const sx=e.x-camX;
  if(sx+e.w<-4||sx>W+4||!e.alive)return;
  ctx.save();ctx.translate(sx+18,e.y+14);
  if(e.dir<0)ctx.scale(-1,1);
  const flap=Math.sin(e.animT*.25)*28;
  const cfg=PHASES[ph];
  let bodyCol,wingCol,eyeCol;
  if(ph===9){bodyCol='#8a2000';wingCol='#5a0000';eyeCol='#ff6600';}
  else if(ph===4){bodyCol='#4488aa';wingCol='#2a6688';eyeCol='#88ddff';}
  else if(ph===10){bodyCol='#4a0a8a';wingCol='#2a0060';eyeCol='#ff88ff';}
  else{bodyCol='#6a0a9a';wingCol='#4a0070';eyeCol='#ff2244';}
  // wings
  ctx.fillStyle=wingCol;
  ctx.beginPath();ctx.moveTo(-4,2);ctx.quadraticCurveTo(-26,flap-10,-34,flap+4);
  ctx.quadraticCurveTo(-20,flap+14,-4,8);ctx.fill();
  ctx.beginPath();ctx.moveTo(4,2);ctx.quadraticCurveTo(26,flap-10,34,flap+4);
  ctx.quadraticCurveTo(20,flap+14,4,8);ctx.fill();
  ctx.strokeStyle=`rgba(${ph===4?'100,200,255':'200,100,255'},.35)`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-4,4);ctx.quadraticCurveTo(-18,flap-2,-28,flap+2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(4,4);ctx.quadraticCurveTo(18,flap-2,28,flap+2);ctx.stroke();
  // body
  const bg=ctx.createRadialGradient(-3,-6,2,0,0,14);
  bg.addColorStop(0,bodyCol);bg.addColorStop(1,wingCol);
  ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,-2,13,12,0,0,Math.PI*2);ctx.fill();
  // ears
  const earCol=wingCol;
  ctx.fillStyle=earCol;
  ctx.beginPath();ctx.moveTo(-10,-12);ctx.lineTo(-5,-22);ctx.lineTo(-1,-12);ctx.fill();
  ctx.beginPath();ctx.moveTo(10,-12);ctx.lineTo(5,-22);ctx.lineTo(1,-12);ctx.fill();
  ctx.fillStyle='rgba(255,180,255,0.4)';
  ctx.beginPath();ctx.moveTo(-9,-13);ctx.lineTo(-5,-19);ctx.lineTo(-2,-13);ctx.fill();
  ctx.beginPath();ctx.moveTo(9,-13);ctx.lineTo(5,-19);ctx.lineTo(2,-13);ctx.fill();
  // eyes
  ctx.fillStyle=eyeCol;ctx.beginPath();ctx.arc(-5,-4,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,-4,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5,-3,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,-3,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-5,-3,1.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,-3,1.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(-7,5,4,7);ctx.fillRect(-1,5,4,7);
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  DRAW — PLAYER
// ═══════════════════════════════════════════════════
function drawPlayer(){
  const sx=P.x-camX;
  const blink=P.inv>0&&Math.floor(P.inv/5)%2===0;
  if(blink)return;
  ctx.save();ctx.translate(sx+P.w/2,P.y);
  if(P.facing<0)ctx.scale(-1,1);
  const run=P.onGround&&Math.abs(P.vx)>.5;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(0,P.h+2,10,4,0,0,Math.PI*2);ctx.fill();
  // shoes
  const ls=run?Math.sin(tick*.22)*12:0;
  ctx.fillStyle='#3e2723';ctx.save();ctx.rotate(ls*.018);ctx.fillRect(-14,P.h-12,16,10);ctx.restore();
  ctx.fillStyle='#5d4037';ctx.save();ctx.rotate(ls*.018);ctx.fillRect(-16,P.h-4,18,6);ctx.restore();
  ctx.fillStyle='#3e2723';ctx.save();ctx.rotate(-ls*.018);ctx.fillRect(-1,P.h-12,16,10);ctx.restore();
  ctx.fillStyle='#5d4037';ctx.save();ctx.rotate(-ls*.018);ctx.fillRect(-1,P.h-4,18,6);ctx.restore();
  // overalls
  ctx.fillStyle='#1565c0';ctx.fillRect(-12,18,24,24);
  ctx.fillStyle='#0d47a1';ctx.fillRect(-7,8,6,14);ctx.fillRect(1,8,6,14);ctx.fillRect(-8,12,16,10);
  ctx.fillStyle='#ffd54f';ctx.beginPath();ctx.arc(-5,10,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5,10,2,0,Math.PI*2);ctx.fill();
  // shirt
  ctx.fillStyle='#c62828';ctx.fillRect(-12,10,5,18);ctx.fillRect(7,10,5,18);
  // arms
  const as=run?Math.sin(tick*.22)*18:0;
  ctx.fillStyle='#c62828';ctx.save();ctx.rotate(-as*.02);ctx.fillRect(-17,8,7,16);
  ctx.fillStyle='#ffcc80';ctx.fillRect(-18,20,8,8);ctx.restore();
  ctx.fillStyle='#c62828';ctx.save();ctx.rotate(as*.02);ctx.fillRect(10,8,7,16);
  ctx.fillStyle='#ffcc80';ctx.fillRect(10,20,8,8);ctx.restore();
  // neck
  ctx.fillStyle='#ffcc80';ctx.fillRect(-5,0,10,10);
  // head
  const hg=ctx.createRadialGradient(0,-10,2,0,-10,14);
  hg.addColorStop(0,'#ffe0b2');hg.addColorStop(1,'#ffcc80');
  ctx.fillStyle=hg;ctx.beginPath();ctx.roundRect(-13,-24,26,24,4);ctx.fill();
  ctx.fillStyle='#ffcc80';ctx.beginPath();ctx.arc(-13,-14,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(13,-14,5,0,Math.PI*2);ctx.fill();
  // hat
  ctx.fillStyle='#c62828';ctx.fillRect(-14,-32,28,10);ctx.fillRect(-11,-46,22,16);
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(-10,-45,8,5);
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(-14,-23,28,2);
  ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('M',0,-38);
  // eyes
  ctx.fillStyle='#fff';ctx.fillRect(-9,-20,7,7);ctx.fillRect(2,-20,7,7);
  ctx.fillStyle='#1a237e';ctx.fillRect(-7,-19,4,5);ctx.fillRect(3,-19,4,5);
  ctx.fillStyle='#fff';ctx.fillRect(-6,-19,2,2);ctx.fillRect(4,-19,2,2);
  // nose
  ctx.fillStyle='#ffaa70';ctx.beginPath();ctx.arc(0,-13,5,0,Math.PI*2);ctx.fill();
  // mustache
  ctx.fillStyle='#3e2723';
  ctx.beginPath();ctx.ellipse(-5,-9,7,3.5,-.2,0,Math.PI);ctx.fill();
  ctx.beginPath();ctx.ellipse(5,-9,7,3.5,.2,0,Math.PI);ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  DRAW — PARTICLES
// ═══════════════════════════════════════════════════
function drawParticles(){
  for(const p of parts){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════
//  DRAW — MINIMAP / HINTS
// ═══════════════════════════════════════════════════
function drawHints(){
  // phase name
  const cfg=PHASES[phase];
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='bold 8px "Press Start 2P",monospace';
  ctx.textAlign='right';ctx.fillText(cfg.name,W-10,H-10);
  // key indicator
  if(!LV.keyItem.collected){
    const px=((LV.keyItem.x/LW)*(W-80))+40;
    ctx.fillStyle='rgba(255,233,78,.8)';
    ctx.beginPath();ctx.moveTo(px,H-6);ctx.lineTo(px-5,H-14);ctx.lineTo(px+5,H-14);ctx.fill();
  }
  // door indicator
  const dp=((LV.door.x/LW)*(W-80))+40;
  ctx.fillStyle=`rgba(${hasKey?'46,204,113':'100,100,100'},.7)`;
  ctx.beginPath();ctx.moveTo(dp,H-6);ctx.lineTo(dp-5,H-14);ctx.lineTo(dp+5,H-14);ctx.fill();
}

// ═══════════════════════════════════════════════════
//  MAIN DRAW
// ═══════════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,HUD);
  if(gState==='playing'||gState==='math'||gState==='transition'){
    drawSky(phase);
    drawWeather(phase);
    drawGround(phase);
    drawPlatforms(phase);
    drawDoor();      // porta depois das plataformas — aparece na frente do castelo
    drawCoins();
    drawKey();
    for(const e of LV.enemies){
      if(e.type==='goomba')drawGoomba(e,phase);
      else drawFlyEnemy(e,phase);
    }
    drawPlayer();
    drawParticles();
    if(gState==='playing')drawHints();
  }
}

// ═══════════════════════════════════════════════════
//  MENU BACKGROUND
// ═══════════════════════════════════════════════════
let menuTick=0;
function drawMenuBg(){
  const mc=document.getElementById('menuBg');
  const mx=mc.getContext('2d');
  mx.clearRect(0,0,W,H);
  menuTick++;
  const sk=mx.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,'#0a0a2e');sk.addColorStop(1,'#1a1a4e');
  mx.fillStyle=sk;mx.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<60;i++){
    const sx=(i*137+menuTick*.2)%W;
    const sy=(i*97)%H;
    const a=.4+Math.sin(menuTick*.05+i)*.35;
    mx.fillStyle=`rgba(255,255,255,${a})`;
    mx.beginPath();mx.arc(sx,sy,.8+Math.sin(i)*.5,0,Math.PI*2);mx.fill();
  }
  // floating platforms
  for(let i=0;i<4;i++){
    const px=((i*220+menuTick*.8)%W+W)%W;
    const py=200+Math.sin(menuTick*.03+i)*30+i*60;
    mx.fillStyle='#c0392b';mx.fillRect(px,py,90,12);
    mx.fillStyle='rgba(255,255,255,0.6)';mx.beginPath();mx.arc(px+20,py+4,3,0,Math.PI*2);mx.fill();
    mx.beginPath();mx.arc(px+50,py+3,2.5,0,Math.PI*2);mx.fill();
    // coin on platform
    mx.fillStyle='#ffe94e';mx.beginPath();mx.arc(px+45,py-10+Math.sin(menuTick*.08+i)*4,7,0,Math.PI*2);mx.fill();
  }
  requestAnimationFrame(drawMenuBg);
}

// ═══════════════════════════════════════════════════
//  OVERLAY HELPERS
// ═══════════════════════════════════════════════════
function showMenu(title,msg){
  const ol=document.getElementById('overlay');
  ol.querySelector('h1').textContent=title;
  ol.querySelectorAll('.pp')[0].textContent=msg;
  ol.style.display='flex';
}

// ═══════════════════════════════════════════════════
//  WIN
// ═══════════════════════════════════════════════════
function finishGame(){
  gState='win';stopBgMusic();
  document.getElementById('winStars').textContent='⭐⭐⭐';
  document.getElementById('winMsg').innerHTML=`Você completou as 10 fases!<br>Pontuação: <b style="color:#ffe94e">${score}</b>`;
  document.getElementById('winScore').textContent=`🏆 CAMPEÃO DO SABER! 🏆`;
  document.getElementById('win').style.display='flex';
  sfxAllWin();
}

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
let raf=null;
function loop(){
  update();draw();raf=requestAnimationFrame(loop);
}
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
function startGame(){
  phase=1;score=0;lives=3;totalScore=0;
  loadPhase(1);gState='playing';
  initWeather();
  startBgMusic();
  if(!raf)loop();
}

document.getElementById('startBtn').onclick=()=>{
  initAC();
  document.getElementById('overlay').style.display='none';
  startGame();
};
document.getElementById('restartBtn').onclick=()=>{
  document.getElementById('win').style.display='none';
  document.getElementById('overlay').style.display='none';
  startGame();
};
drawMenuBg();
draw();
</script>
</body>
</html>
